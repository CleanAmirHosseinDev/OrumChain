<svg width="1000" height="750" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .title { font: bold 24px sans-serif; }
            .subtitle { font: bold 16px sans-serif; fill: #555; }
            .actor { fill: #e3f2fd; stroke: #90caf9; stroke-width: 2; }
            .contract { fill: #e8f5e9; stroke: #a5d6a7; stroke-width: 2; }
            .label { font: 14px sans-serif; text-anchor: middle; }
            .flow-label { font: 11px sans-serif; text-anchor: middle; }
            .arrow-line { stroke: #616161; stroke-width: 1.5; }
            .dashed-line { stroke: #9e9e9e; stroke-width: 1.5; stroke-dasharray: 4 4; }
        </style>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#616161" />
        </marker>
    </defs>

    <rect x="0" y="0" width="1000" height="750" fill="#fcfcfc" />
    <text x="500" y="40" class="title" text-anchor="middle">BourseChain Architecture</text>

    <!-- Off-Chain Zone -->
    <rect x="20" y="70" width="470" height="660" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="10" />
    <text x="255" y="100" class="subtitle" text-anchor="middle">Off-Chain World</text>

    <g id="actor-user">
        <rect x="50" y="130" width="180" height="60" class="actor" rx="5" />
        <text x="140" y="165" class="label">User / Investor</text>
    </g>
    <g id="actor-custodian">
        <rect x="50" y="220" width="180" height="60" class="actor" rx="5" />
        <text x="140" y="255" class="label">Gold Custodian</text>
    </g>
    <g id="actor-kyc">
        <rect x="50" y="310" width="180" height="60" class="actor" rx="5" />
        <text x="140" y="345" class="label">KYC Provider</text>
    </g>
     <g id="actor-relayer">
        <rect x="50" y="400" width="180" height="60" class="actor" rx="5" />
        <text x="140" y="435" class="label">zkSync Relayer</text>
    </g>

    <!-- On-Chain Zone -->
    <rect x="510" y="70" width="470" height="660" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="10" />
    <text x="745" y="100" class="subtitle" text-anchor="middle">On-Chain World (zkSync L2)</text>

    <g id="contract-kyc">
        <rect x="540" y="130" width="200" height="60" class="contract" rx="5" />
        <text x="640" y="165" class="label">KYCRegistry</text>
    </g>
    <g id="contract-manager">
        <rect x="540" y="220" width="200" height="60" class="contract" rx="5" />
        <text x="640" y="255" class="label">CustodyAttestationManager</text>
    </g>
    <g id="contract-token">
        <rect x="540" y="310" width="200" height="60" class="contract" rx="5" />
        <text x="640" y="345" class="label">GoldToken (BCG)</text>
    </g>
    <g id="contract-oracle">
        <rect x="540" y="400" width="200" height="60" class="contract" rx="5" />
        <text x="640" y="435" class="label">OracleAggregator</text>
    </g>
    <g id="contract-options">
        <rect x="540" y="490" width="200" height="120" class="contract" rx="5" />
        <text x="640" y="525" class="label">OptionFactory</text>
        <text x="640" y="555" class="label">&amp;</text>
        <text x="640" y="585" class="label">ClearingHouse</text>
    </g>

    <!-- Flows -->
    <path d="M 140 190 L 140 220" class="arrow-line" marker-end="url(#arrow)" />
    <text x="170" y="205" class="flow-label">1. Deposit Gold</text>

    <path d="M 230 250 L 280 250 L 280 165 L 230 165" class="arrow-line" marker-end="url(#arrow)" />
    <text x="310" y="205" class="flow-label">2. Get Attestation</text>

    <path d="M 140 190 C 50 250, 50 300, 140 310" fill="none" class="dashed-line" />
    <text x="80" y="260" class="flow-label">3. Complete KYC</text>

    <path d="M 230 340 L 540 165" class="arrow-line" marker-end="url(#arrow)" />
    <text x="385" y="245" class="flow-label">4. Update Merkle Root</text>

    <path d="M 230 160 L 540 160" class="arrow-line" marker-end="url(#arrow)" />
    <text x="385" y="150" class="flow-label">5. Submit Merkle Proof</text>

    <path d="M 230 165 L 540 250" class="arrow-line" marker-end="url(#arrow)" />
    <text x="385" y="210" class="flow-label">6. Request Mint</text>

    <path d="M 640 280 L 640 310" class="arrow-line" marker-end="url(#arrow)" />
    <text x="680" y="295" class="flow-label">7. Mint Tokens</text>

    <path d="M 230 165 L 400 165 L 400 340 L 540 340" class="arrow-line" marker-end="url(#arrow)" />
    <text x="400" y="190" class="flow-label">8. Burn Tokens for Redemption</text>

    <path d="M 740 340 L 850 340 L 850 550 L 740 550" class="arrow-line" marker-end="url(#arrow)" />
    <text x="870" y="450" class="flow-label">9. Interact with Options</text>

    <path d="M 640 460 L 640 490" class="arrow-line" marker-end="url(#arrow)" />
    <text x="680" y="475" class="flow-label">10. Get Price</text>

</svg>
